# -*- coding: utf-8 -*-
version: "3"

services:
# ___________________________Hadoop Name Node__________________________
  namenode:
    image: apache/hadoop:3.3.6
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"
      - "8020:8020"
    environment:
      - CORE-SITE.XML_fs.defaultFS=hdfs://namenode:8020
      - HDFS-SITE.XML_dfs.namenode.rpc-address=namenode:8020
      - HADOOP_HOME=/opt/hadoop
    command: >
      bash -c "if [ ! -d /hadoop/dfs/name/current ]; then
        /opt/hadoop/bin/hdfs namenode -format -force;
      fi; /opt/hadoop/bin/hdfs namenode"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    deploy:
      resources:
        limits:
          memory: 3g 
    networks:
      - fraud-net

  datanode:
    image: apache/hadoop:3.3.6
    container_name: datanode
    hostname: datanode
    ports:
      - "9864:9864"
    environment:
      - CORE-SITE.XML_fs.defaultFS=hdfs://namenode:8020
      - HADOOP_HOME=/opt/hadoop
    command: /opt/hadoop/bin/hdfs datanode
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    depends_on:
      - namenode
    deploy:
      resources:
        limits:
          memory: 3g 
    networks:
      - fraud-net

#___________________________Hadoop Data Node__________________________
  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager
    restart: always
    environment:
      SERVICE_PRECONDITION: "namenode:8020 namenode:9870 datanode:9864"
    env_file:
      - ./hadoop.env
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 3g 
#___________________________Hadoop Node Manager__________________________
  nodemanager1:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager
    restart: always
    environment:
      SERVICE_PRECONDITION: "namenode:8020 namenode:9870 datanode:9864 resourcemanager:8088"
    env_file:
      - ./hadoop.env
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 3g 
#___________________________Hadoop History Server__________________________
  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: historyserver
    restart: always
    networks:
      - fraud-net
    environment:
      SERVICE_PRECONDITION: "namenode:8020 namenode:9870 datanode:9864 resourcemanager:8088"
    volumes:
      - hadoop_historyserver:/hadoop/yarn/timeline
    env_file:
      - ./hadoop.env
    deploy:
      resources:
        limits:
          memory: 3g 

#____________________________SCHEMA REGISTRY___________________________

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: schema-registry
    ports:
      - "8083:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092,kafka2:9093,kafka3:9094
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      - kafka
      - kafka2
      - kafka3
    networks:
      - fraud-net 
    deploy:
      resources:
        limits:
          memory: 3g
# #____________________________Spark Master____________________________
  spark-master:
    image: apache/spark:3.4.1
    container_name: spark-master
    depends_on:
      - namenode
      - datanode
    ports:
      - "8080:8080"
      - "7077:7077"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    volumes:
      - D:\project\projeet\kafka project:/app
      - ./metrics.properties:/spark/conf/metrics.properties
    environment:
      - INIT_DAEMON_STEP=setup_spark
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
      - SPARK_MASTER_HOST=spark-master
      - SPARK_LOCAL_IP=spark-master
      - SPARK_SUBMIT_OPTIONS=--packages io.delta:delta-core_2.12:2.1.0
      - SPARK_CONF_spark_sql_extensions=io.delta.sql.DeltaSparkSessionExtension
      - SPARK_CONF_spark_sql_catalog_spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog
      

    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 4g 
  spark-worker:
    image: apache/spark:3.4.1
    container_name: spark-worker
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    extra_hosts:
      - "spark-worker:127.0.0.1"
    volumes:
      - D:\project\projeet\kafka project:/app
    environment:
      - "SPARK_MASTER=spark://spark-master:7077"
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
      - SPARK_LOCAL_IP=spark-worker
      - SPARK_SUBMIT_OPTIONS=--packages io.delta:delta-core_2.12:2.1.0
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 4g
#____________________Hive___________________
  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-server
    depends_on:
      - namenode
      - datanode
    env_file:
      - ./hadoop-hive.env
    environment:
      HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://hive-metastore/metastore"
      SERVICE_PRECONDITION: "hive-metastore:9083"
    ports:
      - "10000:10000"
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 3g 

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-metastore
    env_file:
      - ./hadoop-hive.env
    command: /opt/hive/bin/hive --service metastore
    environment:
      SERVICE_PRECONDITION: "namenode:9870 datanode:9864 hive-metastore-postgresql:5432"
    ports:
      - "9083:9083"
    networks:
      - fraud-net

  hive-metastore-postgresql:
    image: bde2020/hive-metastore-postgresql:2.3.0
    container_name: hive-metastore-postgresql
    ports:
      - "5432:5432"
    networks:
      - fraud-net
  presto-coordinator:
    image: shawnzhu/prestodb:0.181
    container_name: presto-coordinator
    ports:
      - "8089:8080"
    networks:
    - fraud-net
    deploy:
      resources:
        limits:
          memory: 3g 

#___________________kafka___________________

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
    - zookeeper_data:/var/lib/zookeeper/data  
    - zookeeper_log:/var/lib/zookeeper/log
    ports:
      - "2181:2181"
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 2g 

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_BROKER_ID: 1
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 60000
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 60000
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"  
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
    - kafka1_data:/var/lib/kafka/data
    - D:\project\projeet\kafka project:/app
    depends_on:
      - zookeeper
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 3g 

  kafka2:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka2
    ports:
      - "9093:9093"
      - "29093:29093"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_BROKER_ID: 2
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9093,PLAINTEXT_HOST://localhost:29093
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 60000
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 60000
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"  
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
    - kafka2_data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 3g 
  kafka3:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka3
    ports:
      - "9094:9094"
      - "29094:29094"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_BROKER_ID: 3
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka3:9094,PLAINTEXT_HOST://localhost:29094
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 60000
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 60000
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"  
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9094,PLAINTEXT_HOST://0.0.0.0:29094
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
    - kafka3_data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 3g        
#___________________kafka-ui___________________
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8082:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=pharmacy-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAP_SERVERS=kafka:9092,kafka2:9093,kafka3:9094
      - KAFKA_CLUSTERS_0_SCHEMAREGISTRY=http://schema-registry:8081
      - KAFKA_CLUSTERS_0_READONLY=false
      - SERVER_SERVLET_CONTEXT_PATH=/
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 3g 

# ________________grafana______________
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3010:3000"
    depends_on:
      - prometheus
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 3g 
#________________prometheus______________
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml  
    deploy:
      resources:
        limits:
          memory: 3g
    networks:
      - fraud-net  
    
    

# #________________cadvisor______________
  cadvisor:
    image: gcr.io/cadvisor/cadvisor
    container_name: cadvisor
    ports:
      - "8087:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - fraud-net
    deploy:
      resources:
        limits:
          memory: 3g 
#________________airflow_____________
  airflow:
    image: apache/airflow:2.8.1
    container_name: airflow
    user: root
    ports:
    - "8088:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags

    volumes:
    # - ./airflow-db:/opt/airflow
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create \
        --username admin \
        --firstname admin \
        --lastname admin \
        --role Admin \
        --email admin@example.com \
        --password admin || true &&
      airflow webserver & 
      airflow scheduler"

    networks:
      - fraud-net


