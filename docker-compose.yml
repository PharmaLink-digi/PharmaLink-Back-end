  #     resources:
  #       limits:
  #         memory: 4g 



networks:
    fraud-net:
      driver: bridge

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka1_data:
  hadoop_namenode:
  hadoop_datanode:
  hadoop_historyserver:
  kafka2_data:
  kafka3_data:

